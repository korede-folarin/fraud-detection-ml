artifacts_root: artifacts

data_ingestion:
  root_dir: artifacts/data_ingestion
  local_data_file: data/creditcard.csv

data_transformation:
  root_dir: artifacts/data_transformation
  raw_data_path: artifacts/data_ingestion/raw_data.csv
  train_path: artifacts/data_transformation/X_train.pkl
  validate_path: artifacts/data_transformation/X_validate.pkl
  test_path: artifacts/data_transformation/X_test.pkl

model_trainer:
  root_dir: artifacts/model_trainer
  train_data_path: artifacts/data_transformation/train_transformed.pkl
  validate_data_path: artifacts/data_transformation/validate_transformed.pkl
  test_data_path: artifacts/data_transformation/test_transformed.pkl
  model_path: artifacts/model_trainer/models

model_evaluation:
  root_dir: artifacts/model_evaluation
  model_path: artifacts/model_trainer/models
  validate_data_path: artifacts/data_transformation/validate_transformed.pkl
  test_data_path: artifacts/data_transformation/test_transformed.pkl
  evaluation_results: artifacts/model_evaluation/evaluation_results.json
  mlflow_uri: https://dagshub.com/korede-folarin/fraud-detection-ml.mlflow